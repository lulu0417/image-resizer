<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Image Resizer</h1>

        <section class="upload-section">
            <div class="drop-zone" id="dropZone">
                <p>拖拽图片到此处，或点击选择文件</p>
                <input type="file" id="fileInput" multiple accept="image/*" hidden>
            </div>
            <div class="file-list" id="fileList"></div>
        </section>

        <section class="settings-section">
            <div class="settings-row">
                <div class="field">
                    <label for="width">宽度 (px)</label>
                    <input type="number" id="width" min="1" max="10000" value="800">
                </div>
                <div class="field">
                    <label for="height">高度 (px)</label>
                    <input type="number" id="height" min="1" max="10000" value="600">
                </div>
                <div class="field">
                    <label for="mode">拉伸模式</label>
                    <select id="mode">
                        <option value="stretch">强制拉伸</option>
                        <option value="fit">等比缩放 (白色填充)</option>
                    </select>
                </div>
                <div class="field">
                    <label for="format">输出格式</label>
                    <select id="format">
                        <option value="original">保持原格式</option>
                        <option value="png">PNG</option>
                        <option value="jpeg">JPG</option>
                        <option value="webp">WebP</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="previewBtn" disabled>预览处理效果</button>
        </section>

        <section class="preview-section" id="previewSection" hidden>
            <h2>预览结果</h2>
            <div class="preview-grid" id="previewGrid"></div>
            <div class="save-row">
                <button class="btn btn-success" id="downloadAllBtn">下载全部</button>
            </div>
        </section>

        <div class="toast" id="toast"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
